<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goleta Parts & Wishlist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains+Mono', monospace; }
        .title-font { font-family: 'Archivo+Black', sans-serif; }
        
        /* Estilo do "Já Comprei" */
        .bought { 
            filter: grayscale(1) !important; 
            opacity: 0.4; 
            pointer-events: none; /* Opcional: impede novos cliques após marcado */
        }
        .bought .check-badge { display: block !important; }
        .card-shadow { box-shadow: 10px 10px 0px 0px rgba(220, 38, 38, 0.2); }
    </style>
</head>
<body class="bg-[#0a0a0a] text-gray-100 pb-20 text-sm">

    <header class="py-16 px-6 text-center bg-gradient-to-b from-red-900/20 to-transparent">
        <h1 class="title-font text-5xl italic uppercase tracking-tighter text-red-600 mb-2">PROJETO <span class="text-white">GOLETA</span></h1>
        <p class="text-gray-500 uppercase tracking-[0.3em] text-xs">Lista de Peças & Upgrades</p>
    </header>

    <nav class="max-w-6xl mx-auto px-6 mb-12 flex flex-wrap gap-4 justify-center">
        <button onclick="filterPrice('all')" class="px-4 py-2 border border-red-600 bg-red-600 text-white font-bold uppercase text-[10px]">Todos</button>
        <button onclick="filterPrice('low')" class="px-4 py-2 border border-gray-700 hover:border-red-600 text-gray-400 font-bold uppercase text-[10px]">Até R$ 150</button>
        <button onclick="filterPrice('mid')" class="px-4 py-2 border border-gray-700 hover:border-red-600 text-gray-400 font-bold uppercase text-[10px]">R$ 151 - R$ 500</button>
        <button onclick="filterPrice('high')" class="px-4 py-2 border border-gray-700 hover:border-red-600 text-gray-400 font-bold uppercase text-[10px]">R$ 500+</button>
    </nav>

    <main class="max-w-6xl mx-auto px-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8" id="parts-grid">
        
        <div class="item-card card-shadow bg-[#151515] border border-gray-800 p-4 transition-all relative cursor-pointer" 
             data-price="120" id="item-1" onclick="markAsBought('item-1')">
            
            <div class="check-badge hidden absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-20 bg-green-500 text-black font-black px-4 py-2 rotate-12 border-4 border-black text-lg">
                GARANTIDO ✅
            </div>

            <img src="https://http2.mlstatic.com/D_NQ_NP_832165-MLB47644342412_092021-O.webp" class="w-full h-40 object-cover border border-gray-800 mb-4">
            <h3 class="title-font text-lg mb-1 uppercase text-white">Manopla de Câmbio Shuttle</h3>
            <p class="text-red-500 font-bold mb-4 italic">R$ 120,00</p>
            <a href="LINK_AQUI" target="_blank" onclick="event.stopPropagation()" class="block text-center py-2 bg-white text-black font-black uppercase text-[10px] hover:bg-red-600 transition-colors">Ver na Loja</a>
        </div>

        <div class="item-card card-shadow bg-[#151515] border border-gray-800 p-4 transition-all relative cursor-pointer" 
             data-price="450" id="item-2" onclick="markAsBought('item-2')">
            
            <div class="check-badge hidden absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-20 bg-green-500 text-black font-black px-4 py-2 rotate-12 border-4 border-black text-lg">
                GARANTIDO ✅
            </div>

            <img src="https://http2.mlstatic.com/D_NQ_NP_918510-MLB45654512402_042021-O.webp" class="w-full h-40 object-cover border border-gray-800 mb-4">
            <h3 class="title-font text-lg mb-1 uppercase text-white">Volante FuelTech</h3>
            <p class="text-red-500 font-bold mb-4 italic">R$ 450,00</p>
            <a href="LINK_AQUI" target="_blank" onclick="event.stopPropagation()" class="block text-center py-2 bg-white text-black font-black uppercase text-[10px] hover:bg-red-600 transition-colors">Ver na Loja</a>
        </div>
