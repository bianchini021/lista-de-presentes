<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gallery - Grand Exhibition</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000; /* Preto puro como na imagem */
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Mantém o layout limpo */
        }

        /* Topo do Site (Menu) */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 60px;
        }

        .logo {
            font-family: 'Bodoni Moda', serif;
            font-size: 1.5rem;
            letter-spacing: 3px;
            font-weight: bold;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: opacity 0.3s;
        }

        nav a:hover {
            opacity: 0.6;
        }

        /* Conteúdo Central */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .est-date {
            font-size: 0.9rem;
            letter-spacing: 4px;
            margin-bottom: 20px;
            font-weight: 300;
        }

        h1 {
            font-family: 'Bodoni Moda', serif;
            font-size: 5rem;
            font-weight: 400;
            letter-spacing: 8px;
            line-height: 1.1;
            margin-bottom: 40px;
        }

        .explore-btn {
            background: transparent;
            color: #fff;
            border: 1px solid #fff;
            padding: 15px 45px;
            font-size: 0.8rem;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.4s;
            font-family: 'Montserrat', sans-serif;
        }

        .explore-btn:hover {
            background: #fff;
            color: #000;
        }

        /* Rodapé com Ícones e Scroll */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 60px;
        }

        .social-icons a {
            color: #fff;
            margin-right: 20px;
            font-size: 1.1rem;
            text-decoration: none;
        }

        .scroll-down {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .scroll-down::after {
            content: "";
            width: 40px;
            height: 1px;
            background-color: #fff;
            display: inline-block;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">THE GALLERY</div>
        <nav>
            <a href="#">Inspiration</a>
            <a href="#">Exhibitions</a>
            <a href="#">Artists</a>
        </nav>
    </header>

    <main>
        <div class="est-date">EST. 1887</div>
        <h1>THE GRAND<br>EXHIBITION</h1>
        <button class="explore-btn">EXPLORE</button>
    </main>

    <footer>
        <div class="social-icons">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
        </div>
        <div class="scroll-down">Scroll Down</div>
    </footer>

</body>
</html>
