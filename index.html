<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist do Mozão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains+Mono', monospace; }
        .item-card { transition: all 0.3s ease; }
        .bought { filter: grayscale(1) opacity(0.4); text-decoration: line-through; border-color: transparent !important; }
        .bought-badge { display: none; }
        .bought .bought-badge { display: block; }
    </style>
</head>
<body class="bg-[#0f1115] text-gray-100 pb-20">

    <header class="py-12 text-center border-b border-gray-800 bg-[#161920]">
        <h1 class="text-4xl font-black italic tracking-tighter text-white">WISH<span class="text-orange-500">LIST</span></h1>
        <p class="text-gray-400 mt-2 text-sm uppercase tracking-widest">TI & GOLETA EDITION</p>
    </header>

    <main class="max-w-5xl mx-auto p-6 grid md:grid-cols-2 gap-12 mt-8">
        
        <section>
            <div class="flex items-center gap-3 mb-8 border-l-4 border-blue-500 pl-4">
                <h2 class="text-2xl font-black uppercase italic text-blue-400">01. Setup & TI</h2>
            </div>
            <div class="space-y-6" id="ti-container">
                <div class="item-card bg-[#1c2128] border border-gray-700 rounded-lg overflow-hidden cursor-pointer relative" onclick="this.classList.toggle('bought')">
                    <div class="absolute top-2 right-2 bg-green-500 text-black text-[10px] font-bold px-2 py-1 rounded bought-badge">JÁ COMPRADO!</div>
                    <img src="https://m.media-amazon.com/images/I/61pP78EwY8L._AC_SX679_.jpg" class="w-full h-48 object-cover" alt="Teclado">
                    <div class="p-4">
                        <h3 class="font-bold text-lg">Teclado Mecânico RGB</h3>
                        <p class="text-blue-400 font-bold">R$ 350,00</p>
                        <a href="https://www.amazon.com.br" target="_blank" onclick="event.stopPropagation()" class="text-xs text-gray-400 underline mt-3 block">Link do Produto</a>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <div class="flex items-center gap-3 mb-8 border-l-4 border-red-600 pl-4">
                <h2 class="text-2xl font-black uppercase italic text-red-500">02. Projeto Goleta</h2>
            </div>
            <div class="space-y-6" id="goleta-container">
                <div class="item-card bg-[#1c2128] border border-gray-700 rounded-lg overflow-hidden cursor-pointer relative" onclick="this.classList.toggle('bought')">
                    <div class="absolute top-2 right-2 bg-green-500 text-black text-[10px] font-bold px-2 py-1 rounded bought-badge">JÁ COMPRADO!</div>
                    <img src="https://m.media-amazon.com/images/I/51rR0v7y+uL._AC_SX679_.jpg" class="w-full h-48 object-cover" alt="Peça">
                    <div class="p-4">
                        <h3 class="font-bold text-lg">Manopla de Câmbio Esportiva</h3>
                        <p class="text-red-500 font-bold text-lg">R$ 120,00</p>
                        <a href="#" target="_blank" onclick="event.stopPropagation()" class="text-xs text-gray-400 underline mt-3 block">Link do Mercado Livre</a>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <footer class="text-center py-10 text-gray-600 text-[10px] uppercase tracking-[0.2em]">
        Status: Build Success | Powered by Gemini
    </footer>

</body>
</html>
