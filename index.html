<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SQL Noir - Wanted</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

        body {
            background-color: #121212; /* Fundo escuro do arquivo */
            color: #e0b044; /* Aquele amarelo/dourado característico do SQL Noir */
            font-family: 'Courier Prime', monospace; /* Fonte de máquina de escrever */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-transform: uppercase;
        }

        .poster {
            border: 4px solid #e0b044;
            padding: 40px;
            max-width: 600px;
            text-align: center;
            background-color: #1a1a1a;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: 10px;
            border-bottom: 4px solid #e0b044;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .sub-header {
            font-size: 1.2rem;
            letter-spacing: 5px;
            margin-bottom: 30px;
        }

        .photo-placeholder {
            width: 300px;
            height: 350px;
            border: 2px solid #e0b044;
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* O X que aparece no lugar da foto no design */
        .photo-placeholder::before, .photo-placeholder::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            background-color: #333;
        }
        .photo-placeholder::before { transform: rotate(45deg); }
        .photo-placeholder::after { transform: rotate(-45deg); }

        .details {
            font-size: 1.5rem;
            letter-spacing: 3px;
        }

        .id-number {
            margin-top: 10px;
            font-size: 1rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="poster">
        <h1>WANTED</h1>
        <div class="sub-header">Dead or Alive</div>
        
        <div class="photo-placeholder">
            <span>No Photo Available</span>
        </div>

        <div class="details">
            THOMAS BROWN
        </div>
        <div class="id-number">ID: 19860814-DOCS</div>
    </div>

</body>
</html>
